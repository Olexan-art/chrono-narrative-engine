name: Simple Automation Test

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Тип джобів для запуску'
        required: true
        type: string
        default: 'specific'
      specific_job:
        description: 'Конкретний джоб'
        required: false
        type: string
        default: 'retell_recent_usa'

jobs:
  simple-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci

    - name: Run Test
      env:
        JOB_TYPE: ${{ github.event.inputs.job_type }}
        SPECIFIC_JOB: ${{ github.event.inputs.specific_job }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://xvhlqxzudqmpsqrvzxfm.supabase.co' }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2aGxxeHp1ZHFtcHNxcnZ6eGZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDkzMDU5MTgsImV4cCI6MjAyNDg4MTkxOH0.SzPLgG3e8z3_xjxMvU6a8owU6zLhXj0L_lVYXwXbXl8' }}
      run: |
        echo "🚀 ПРОСТИЙ ТЕСТ АВТОМАТИЗАЦІЇ"
        echo "Job type: $JOB_TYPE"
        echo "Specific job: $SPECIFIC_JOB"
        
        echo "🌐 Перевірка з'єднання..."
        ping -c 3 xvhlqxzudqmpsqrvzxfm.supabase.co || echo "❌ Ping failed"
        nslookup xvhlqxzudqmpsqrvzxfm.supabase.co || echo "❌ DNS lookup failed"
        curl -v https://xvhlqxzudqmpsqrvzxfm.supabase.co/rest/v1/ --max-time 10 || echo "❌ Curl failed"
        
        echo "✅ Крок виконано"

        if [ "$JOB_TYPE" = "specific" ] && [ "$SPECIFIC_JOB" ]; then
          echo "🔍 Запуск джобу: $SPECIFIC_JOB"
          node manage-complete-cron.mjs run "$SPECIFIC_JOB"
        fi