name: Test Automation

on:
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Тип джобів для запуску'
        required: true
        type: string
        default: 'specific'
      specific_job:
        description: 'Конкретний джоб'
        required: false
        type: string
        default: 'retell_recent_usa'

jobs:
  test:
    name: Test Automation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Test Command
        env:
          JOB_TYPE: ${{ github.event.inputs.job_type }}
          SPECIFIC_JOB: ${{ github.event.inputs.specific_job }}
        run: |
          echo "🚀 ТЕСТОВИЙ ЗАПУСК"
          echo "Job type: $JOB_TYPE"
          echo "Specific job: $SPECIFIC_JOB"
          echo "✅ Основний крок виконано"
          
          if [ "$JOB_TYPE" = "specific" ] && [ "$SPECIFIC_JOB" ]; then
            echo "🔍 Запуск конкретного джобу: $SPECIFIC_JOB"
            node manage-complete-cron.mjs run "$SPECIFIC_JOB"
          fi