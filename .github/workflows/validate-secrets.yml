name: Validate Secrets

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check required secrets
        run: |
          echo "Validating presence of critical secrets (names only)"
          req=(NETLIFY_AUTH_TOKEN NETLIFY_SITE_ID SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF CF_ZONE_ID CF_API_TOKEN)
          missing=0
          for k in ${req[@]}; do
            if [ -z "${!k}" ]; then echo "- MISSING: $k"; missing=$((missing+1)); else echo "+ OK: $k"; fi
          done
          if [ "$missing" -gt 0 ]; then echo "Some secrets are missing (see above)."; fi
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}