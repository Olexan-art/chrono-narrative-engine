name: CI Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  smoke:
    name: Install + Build (non-blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Build (continue on error)
        run: pnpm run build || echo "Build failed (smoke continues)"

      - name: Summary
        run: |
          echo "CI smoke completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"