name: Auto Release Production

on:
  push:
    branches:
      - main
    # Run on any change to main to ensure release always triggers
  workflow_dispatch:
    inputs:
      deploy_netlify:
        description: 'Deploy to Netlify'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: auto-release-prod
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Optional Build Hook fallback for Netlify
      NETLIFY_BUILD_HOOK_URL: ${{ secrets.NETLIFY_BUILD_HOOK_URL }}
      # Cloudflare (optional, used for cache purge)
      CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      # Base URL for testing/summary
      PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyYAML

      - name: Pre-warm (no purge) — optional
        run: |
          echo "Pre-warm endpoints (optional step)"
          python scripts/release_prod.py --version "v$(date +%Y%m%d-%H%M%S)" --skip-cache || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Deploy to Netlify via Build Hook (fallback)
        if: github.event.inputs.deploy_netlify != 'false' && env.NETLIFY_BUILD_HOOK_URL != ''
        run: |
          echo "Triggering Netlify via Build Hook..."
          RESP=$(curl -s -w "\nHTTP:%{http_code}" -X POST "$NETLIFY_BUILD_HOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"trigger\":\"auto_release\",\"branch\":\"${{ github.ref_name }}\",\"commit\":\"${{ github.sha }}\"}")
          echo "$RESP" | sed -n '1,200p'
          CODE=$(echo "$RESP" | sed -n '$p' | cut -d: -f2)
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Build hook failed with HTTP $CODE"; exit 1; fi

      - name: Deploy to Netlify (actions)
        if: github.event.inputs.deploy_netlify != 'false' && env.NETLIFY_BUILD_HOOK_URL == ''
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Auto release deployment - ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
          enable-commit-status: false
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Purge Cloudflare cache (post-deploy)
        if: env.CF_ZONE_ID != '' && env.CF_API_TOKEN != ''
        run: |
          echo "Purging Cloudflare cache (post-deploy)..."
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | sed -n '1,200p'

      - name: Warm main site cache (post-deploy)
        run: |
          echo "Running warm_main_cache script..."
          node scripts/warm_main_cache.js
        env:
          SUPABASE_FUNCTIONS_URL: ${{ secrets.SUPABASE_FUNCTIONS_URL }}
          PROD_BASE_URL: ${{ secrets.PROD_BASE_URL }}

      - name: Verify deployment
        if: github.event.inputs.deploy_netlify != 'false'
        run: |
          echo "📋 Deployment Summary:"
          echo "- Branch: ${{ github.ref_name }}"
          echo "- Commit: ${{ github.sha }}"
          echo "- Triggered at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo ""
          echo "Check Netlify dashboard for deployment status."